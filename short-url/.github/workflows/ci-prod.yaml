name: CI - Prod

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Unit & API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r apps/url-shortener/requirements.txt
          pip install -r tests/requirements-test.txt
        working-directory: short-url

      - name: Run unit tests
        run: pytest tests/unit/ -v
        working-directory: short-url

      - name: Run API tests
        run: pytest tests/api/ -v
        working-directory: short-url

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push url-shortener image
        uses: docker/build-push-action@v6
        with:
          context: short-url/apps/url-shortener
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener:${{ github.ref_name }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: short-url/apps/frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.ref_name }}
