server {
    listen 80;

    # Serve static React build files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the url-shortener service
    location /api/ {
        proxy_pass http://url-shortener:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy short code redirects to the url-shortener service
    # Matches /{short_code} paths (URL-safe base64 characters, no file extension)
    location ~ ^/[A-Za-z0-9_-]+$ {
        proxy_pass http://url-shortener:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
