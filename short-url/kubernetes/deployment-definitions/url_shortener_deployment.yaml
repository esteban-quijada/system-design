apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
  labels:
    app: url-shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-shortener
  template:
    metadata:
      labels:
        app: url-shortener
    spec:
      # pod definition yaml
      containers:
        - name: url-shortener
          image: url-shortener:v2.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_USER
              value: "urluser"
            - name: POSTGRES_PASSWORD
              value: "urlpassword"
            - name: POSTGRES_DB
              value: "urldb"
            - name: POSTGRES_HOST
              value: "db"
            - name: POSTGRES_PORT
              value: "5432"
